name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: rustup show active-toolchain

      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            clang \
            cmake \
            libayatana-appindicator3-dev \
            libfontconfig-dev \
            libgtk-3-dev \
            libssl-dev \
            libvulkan1 \
            libx11-xcb-dev \
            libxdo-dev \
            libxkbcommon-x11-dev

      - name: Install macOS Metal toolchain
        if: runner.os == 'macOS'
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Install Rust toolchain and target
        shell: bash
        run: |
          rustup show active-toolchain
          rustup target add "${{ matrix.target }}"

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Run tests
        run: cargo test --locked --all-targets --target ${{ matrix.target }}

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
