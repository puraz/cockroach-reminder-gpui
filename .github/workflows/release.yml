name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build, for example v1.0.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Match tag to Cargo version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.2.3" >&2
            exit 1
          fi

          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          PACKAGE_VERSION="$(cargo metadata --locked --no-deps --format-version 1 \
            | jq --raw-output '.packages[] | select(.name == "cockroach-reminder-gpui") | .version')"

          if [[ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]]; then
            echo "Tag $RELEASE_TAG does not match Cargo package version $PACKAGE_VERSION" >&2
            exit 1
          fi

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
            package: unix
          - name: Windows x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: windows-x86_64
            package: windows
          - name: macOS Apple Silicon
            os: macos-15
            target: aarch64-apple-darwin
            artifact: macos-aarch64
            package: unix
          - name: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: macos-x86_64
            package: unix

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            clang \
            cmake \
            libayatana-appindicator3-dev \
            libfontconfig-dev \
            libgtk-3-dev \
            libssl-dev \
            libvulkan1 \
            libx11-xcb-dev \
            libxdo-dev \
            libxkbcommon-x11-dev

      - name: Ensure macOS Metal compiler is available
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if xcrun metal --version >/dev/null 2>&1; then
            xcrun metal --version
            exit 0
          fi

          if xcodebuild -help 2>&1 | grep -q -- '-downloadComponent'; then
            xcodebuild -downloadComponent MetalToolchain
          else
            echo "The selected Xcode does not include Metal and cannot download it." >&2
            exit 1
          fi

          xcrun metal --version

      - name: Install Rust toolchain and target
        shell: bash
        run: |
          rustup show active-toolchain
          rustup target add "${{ matrix.target }}"

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Run tests
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix release
        if: matrix.package == 'unix'
        shell: bash
        run: scripts/package-release.sh "${{ matrix.target }}" "${{ needs.validate.outputs.tag }}" dist

      - name: Package Windows release
        if: matrix.package == 'windows'
        shell: pwsh
        run: ./scripts/package-release.ps1 -Target "${{ matrix.target }}" -Version "${{ needs.validate.outputs.tag }}" -OutputDir dist

      - name: Upload packaged release
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  publish:
    name: Publish GitHub release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort --zero-terminated \
            | xargs --null sha256sum > SHA256SUMS

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --generate-notes \
              --title "Cockroach Reminder $RELEASE_TAG" \
              --verify-tag
          fi
